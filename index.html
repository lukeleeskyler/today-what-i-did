    name = name.trim();
    document.getElementById('headerName').textContent = name;
    try {
      openDB().then(function(db) {
        var tx = db.transaction('config', 'readwrite');
        tx.objectStore('config').put({ key: 'nickname', value: name });
      }).catch(function() {});
    } catch(e) {}
  }
}

function showCategoryPicker(dateStr) {
  state._targetDate = dateStr;
  var grid = document.getElementById('catPickerGrid');
  grid.innerHTML = CATEGORIES.filter(function(c) { return c.id !== 'custom'; }).map(function(c) {
    return '<div class="cat-picker-item" onclick="pickCategory(\'' + c.id + '\')">' + c.svg + '<span>' + getCatLabel(c.id, c.label) + '</span></div>';
  }).join('');
  document.getElementById('catPickerOverlay').classList.add('open');
}
function pickCategory(catId) {
  document.getElementById('catPickerOverlay').classList.remove('open');
  var cat = CATEGORIES.find(function(c) { return c.id === catId; });
  if (cat) setTimeout(function() { openEntryForm(cat); }, 100);
}
function closeCatPicker() {
  document.getElementById('catPickerOverlay').classList.remove('open');
  state._targetDate = null;
}

function findCategory(id) {
  return CATEGORIES.find(c => c.id === id);
}

function doSearch(query) {
  clearTimeout(_searchTimeout);
  const results = document.getElementById('weekSearchResults');
  query = query.trim();
  if (!query) {
    results.innerHTML = '';
    return;
  }
  _searchTimeout = setTimeout(() => {
    performSearch(query);
  }, 300);
}

async function performSearch(query) {
  try {
    const results = document.getElementById('weekSearchResults');
    const kw = query.toLowerCase();
    // Use cache if available, else load
    if (!_allEntriesCache) _allEntriesCache = await getAllEntries();
    if (!_allEntriesCache || !_allEntriesCache.length) {
      results.innerHTML = '<div class="search-empty" data-i18n="search.empty"></div>';
      return;
    }
    // Search in multiple fields: text, customQuickLabel, category, and category label
    const matched = _allEntriesCache.filter(e => {
      const searchText = [
        (e.text || '').toLowerCase(),
        (e.customQuickLabel || '').toLowerCase(),
        (e.category || '').toLowerCase(),
      ];
      // Also add category labels (Chinese + English) if it's a standard category
      const cat = findCategory(e.category);
      if (cat) {
        searchText.push(cat.label.toLowerCase()); // Chinese label
        const enCat = CATEGORIES_EN.find(c => c.id === e.category);
        if (enCat) searchText.push(enCat.label.toLowerCase()); // English label
      }
      // Return true if any field contains the keyword
      return searchText.some(field => field.includes(kw));
    });
    // Sort by date descending (using id or date)
    matched.sort((a, b) => (b.id || 0) - (a.id || 0));

    if (matched.length === 0) {
      results.innerHTML = '<div class="search-empty" data-i18n="search.empty"></div>';
      return;
    }

    // Limit to 50 results for performance
    const display = matched.slice(0, 50);
    let html = '';
    for (const e of display) {
      const cat = findCategory(e.category);
      const catName = cat ? getCatLabel(cat.id, cat.label) : e.category;
      const dateStr = dateUtils.formatDisplay(e.date);
      // Show what matched — prefer text, fallback to customQuickLabel, then category
      let displayText = e.text || e.customQuickLabel || e.category || '';
      // Highlight keyword in display text
      const idx = displayText.toLowerCase().indexOf(kw);
      if (idx !== -1) {
        displayText = displayText.slice(0, idx) + '<strong>' + displayText.slice(idx, idx + kw.length) + '</strong>' + displayText.slice(idx + kw.length);
      }
      // Category icon
      const catSvgStr = cat && cat.svg ? cat.svg : (catSvg(e.category) || '');
      html += `<div class="search-result-item" data-eid="${e.id}" onclick="toggleSearchResult(this, ${e.id})">
        <div class="search-result-date">
          <span class="search-result-cat">${catSvgStr ? '<span style="display:inline-block;width:14px;height:14px;vertical-align:-3px;margin-right:2px;">' + catSvgStr + '</span>' : ''}${catName}</span>
          ${dateStr} ${e.amount ? ' ¥' + e.amount : ''}
        </div>
        <div class="search-result-text">${displayText}</div>
      </div>`;
    }
    if (matched.length > 50) {
      html += `<div class="search-empty">${t("search.many")}${matched.length}${t("search.many2")}</div>`;
    }
    results.innerHTML = html;
  } catch(e) {
    console.error('Search error:', e);
    document.getElementById('weekSearchResults').innerHTML = '<div class="search-empty">' + t('search.error') + '</div>';
  }
}

function toggleSearchResult(el, eid) {
  // If already open, close it
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    const detail = el.querySelector('.search-result-detail');
    if (detail) detail.remove();
    return;
  }
  // Close any other open result first
  document.querySelectorAll('.search-result-item.open').forEach(o => {
    o.classList.remove('open');
    const d = o.querySelector('.search-result-detail');
    if (d) d.remove();
  });
  // Find the entry data from cache
  const entry = _allEntriesCache.find(e => e.id === eid);
  if (!entry) return;
  const cat = findCategory(entry.category);
  const catName = cat ? cat.label : entry.category;
  const timeStr = entry.time || '';
  const amtStr = entry.amount ? `<div class="search-result-amount">¥${entry.amount.toFixed(entry.amount % 1 === 0 ? 0 : 2)}</div>` : '';
  // Build images HTML
  const imgs = entry.images || (entry.image ? [entry.image] : []);
  let imgsHtml = '';
  if (imgs.length > 0) {
    imgsHtml = '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">';
    imgs.forEach((src, i) => {
      imgsHtml += `<img src="${src}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer;" onclick="event.stopPropagation();openImageModal('${src}')">`;
    });
    imgsHtml += '</div>';
  }
  // Build expanded detail element
  const detail = document.createElement('div');
  detail.className = 'search-result-detail';
  detail.innerHTML = `
    ${amtStr}
    ${imgsHtml}
    <div style="font-size:11px;color:var(--text-tertiary);margin-top:6px;cursor:pointer;" onclick="event.stopPropagation();this.parentElement.parentElement.classList.remove('open');this.parentElement.remove()">收起 ▲</div>
  `;
  el.appendChild(detail);
  el.classList.add('open');
}

// ============================================================
// SWIPE TO SWITCH TABS
// ============================================================
(function() {
  let startX = 0, startY = 0;
  const mainViews = ['today', 'week', 'month']; // circular: today → week → month → today
  // Lock all touch interactions when category picker is open
  function isPopupOpen() {
    return document.getElementById('catPickerOverlay').classList.contains('open');
  }
  document.addEventListener('touchstart', (e) => {
    if (isPopupOpen()) { startX = 0; return; }
    // Don't swipe when interacting with entry cards, form, or dialogs
    if (e.target.closest('.entry-card') || e.target.closest('.entry-form') || e.target.closest('.dialog-overlay') || e.target.closest('.day-detail-panel')) { startX = 0; return; }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  // Prevent all touch movement when picker is open
  document.addEventListener('touchmove', function(e) {
    if (isPopupOpen()) { e.preventDefault(); return; }
    var panel = e.target.closest('.day-detail-panel');
    if (panel && panel.classList.contains('open')) {
      if (panel.scrollTop <= 0) panel.scrollTop = 1;
      if (panel.scrollTop + panel.clientHeight >= panel.scrollHeight) panel.scrollTop = panel.scrollHeight - panel.clientHeight - 1;
    }
  }, { passive: false });
  document.addEventListener('touchend', async (e) => {
    if (startX === 0) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx) * 1.5) { startX = 0; return; }
    // Settings: swipe from left edge to right → go back to today
    if (state.currentView === 'settings') {
      if (dx > 0) await switchView('today', -1);
      startX = 0;
      return;
    }
    // Main views: circular navigation
    const currentIdx = mainViews.indexOf(state.currentView);
    if (currentIdx === -1) { startX = 0; return; }
    const len = mainViews.length;
    if (dx < 0) await switchView(mainViews[(currentIdx + 1) % len], 1);
    else if (dx > 0) await switchView(mainViews[(currentIdx - 1 + len) % len], -1);
    startX = 0;
  }, { passive: true });
})();
